  function crearBuscador(inputId, listaId, dataArray) {
    const input = document.getElementById(inputId);
    const lista = document.getElementById(listaId);
    input.addEventListener("input", function() {
      const valor = this.value.toLowerCase();
      lista.innerHTML = "";
      if (valor === "") { lista.style.display = "none"; return; }
      const filtro = dataArray.filter(a => a.toLowerCase().includes(valor));

        const div = document.createElement("div");
        div.className = "item"; div.textContent = item;
        div.onclick = () => { input.value = item; lista.style.display = "none"; };
        lista.appendChild(div);
      });
      lista.style.display = filtro.length > 0 ? "block" : "none";
    });
  }
